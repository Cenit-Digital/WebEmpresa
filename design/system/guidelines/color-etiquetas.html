<!-- @dsCard group="Colors" viewport="700x160" subtitle="Bordes y etiquetas (tag pills)" name="Bordes & etiquetas" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:20px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
 .box{width:150px;height:60px;border-radius:12px;border:1px solid var(--color-border);background:var(--color-card-bg);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--color-text-soft)}
 .pill{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--color-tag-ink);background:var(--color-tag-bg);padding:6px 13px;border-radius:999px}
 .cap{font-size:11.5px;color:var(--color-text-soft);margin-top:8px;text-align:center}
 .col{display:flex;flex-direction:column;align-items:center}
</style></head><body>
 <div class="col"><div class="box">1px --color-border</div></div>
 <div class="col"><span class="pill">Presencia</span><div class="cap">--color-tag-ink / --color-tag-bg</div></div>
</body></html>

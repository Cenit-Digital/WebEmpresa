<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:20px;display:flex;gap:20px;align-items:center}
 .grad{height:72px;flex:1;border-radius:var(--radius);background:linear-gradient(135deg,var(--color-primary),var(--color-secondary))}
 .m{font-size:11.5px;color:var(--color-text-soft);max-width:24ch}
 code{font-family:var(--font-sans);color:var(--color-text-soft)}
</style></head><body>
 <div class="grad"></div>
 <div class="m"><code>linear-gradient(135deg, var(--color-primary), var(--color-secondary))</code> — onda del logo, cabeceras de sector y mockups.</div>
</body></html>

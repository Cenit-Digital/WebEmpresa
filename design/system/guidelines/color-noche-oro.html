<!-- @dsCard group="Colors" viewport="700x180" subtitle="Paleta del modo oscuro (data-theme='dark')" name="Noche & Oro (oscuro)" -->
<!DOCTYPE html><html lang="es" data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:18px}
 .row{display:flex;gap:12px;flex-wrap:wrap}
 .sw{width:132px}
 .chip{height:56px;border-radius:12px;border:1px solid var(--color-border)}
 .nm{font-weight:600;font-size:12px;margin-top:7px}
 .hx{font-size:11px;color:var(--color-text-soft)}
</style></head><body>
 <div class="row">
   <div class="sw"><div class="chip" style="background:var(--color-primary)"></div><div class="nm">primary</div><div class="hx">#C9A84C oro</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-secondary)"></div><div class="nm">secondary</div><div class="hx">#7C5CBF violeta</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-bg-2)"></div><div class="nm">bg-2</div><div class="hx">#281b2e</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-card-bg)"></div><div class="nm">card-bg</div><div class="hx">marfil 4.5%</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-primary);color:var(--color-on-primary);display:flex;align-items:center;justify-content:center;font-weight:600">Aa</div><div class="nm">on-primary</div><div class="hx">#16121f</div></div>
 </div>
</body></html>

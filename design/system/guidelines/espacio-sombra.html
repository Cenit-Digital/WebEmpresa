<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Elevación de tarjeta (--shadow)" name="Sombra" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:26px;display:flex;gap:22px;align-items:center}
 .card{background:var(--color-card-bg);border:1px solid var(--color-border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;width:210px}
 .h{font-family:var(--font-display);font-weight:600;font-size:17px}
 .p{font-size:12.5px;color:var(--color-text-soft);margin-top:4px}
 .m{font-size:11.5px;color:var(--color-text-soft);max-width:22ch}
</style></head><body>
 <div class="card"><div class="h">Tarjeta</div><div class="p">radius 20 + --shadow</div></div>
 <div class="m">--shadow claro: 0 18px 45px rgba(0,0,0,.12) · oscuro: 0 22px 55px rgba(0,0,0,.5)</div>
</body></html>

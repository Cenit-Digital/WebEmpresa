<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:18px}
 .row{display:flex;gap:14px;flex-wrap:wrap}
 .sw{width:150px}
 .chip{height:62px;border-radius:12px;border:1px solid var(--color-border)}
 .nm{font-weight:600;font-size:12.5px;margin-top:8px}
 .hx{font-size:11.5px;color:var(--color-text-soft)}
</style></head><body>
 <div class="row">
   <div class="sw"><div class="chip" style="background:var(--color-primary)"></div><div class="nm">--color-primary</div><div class="hx">#1E7A4F</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-secondary)"></div><div class="nm">--color-secondary</div><div class="hx">#E3D34A</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-primary);color:var(--color-on-primary);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px">Aa</div><div class="nm">--color-on-primary</div><div class="hx">#FFFFFF</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-accent)"></div><div class="nm">--color-accent</div><div class="hx">#1E7A4F</div></div>
 </div>
</body></html>

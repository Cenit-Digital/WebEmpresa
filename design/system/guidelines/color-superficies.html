<!-- @dsCard group="Colors" viewport="700x175" subtitle="Fondos, franja, superficies y tarjeta" name="Superficies" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:18px}
 .row{display:flex;gap:12px;flex-wrap:wrap}
 .sw{width:150px}
 .chip{height:56px;border-radius:12px;border:1px solid var(--color-border)}
 .nm{font-weight:600;font-size:12px;margin-top:7px}
 .hx{font-size:11px;color:var(--color-text-soft)}
</style></head><body>
 <div class="row">
   <div class="sw"><div class="chip" style="background:var(--color-bg)"></div><div class="nm">--color-bg</div><div class="hx">Fondo base</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-bg-2)"></div><div class="nm">--color-bg-2</div><div class="hx">Sección alterna</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-band)"></div><div class="nm">--color-band</div><div class="hx">Nav / footer</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-surface)"></div><div class="nm">--color-surface</div><div class="hx">Inputs / notas</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-surface-2)"></div><div class="nm">--color-surface-2</div><div class="hx">Tinte primary</div></div>
   <div class="sw"><div class="chip" style="background:var(--color-card-bg)"></div><div class="nm">--color-card-bg</div><div class="hx">Tarjeta</div></div>
 </div>
</body></html>

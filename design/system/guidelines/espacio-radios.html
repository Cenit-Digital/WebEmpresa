<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:20px;display:flex;gap:16px;flex-wrap:wrap}
 .col{display:flex;flex-direction:column;align-items:center;gap:8px}
 .b{width:96px;height:64px;background:var(--color-surface-2);border:1px solid var(--color-border)}
 .cap{font-size:11.5px;color:var(--color-text-soft);text-align:center}
</style></head><body>
 <div class="col"><div class="b" style="border-radius:var(--radius)"></div><div class="cap">--radius · 20px</div></div>
 <div class="col"><div class="b" style="border-radius:var(--radius-md)"></div><div class="cap">--radius-md · 16px</div></div>
 <div class="col"><div class="b" style="border-radius:var(--radius-sm)"></div><div class="cap">--radius-sm · 12px</div></div>
 <div class="col"><div class="b" style="border-radius:var(--radius-pill);width:64px"></div><div class="cap">--radius-pill · 999px</div></div>
</body></html>

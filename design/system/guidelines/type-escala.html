<!-- @dsCard group="Type" viewport="700x210" subtitle="Escala de tamaños (tokens)" name="Escala" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);padding:18px}
 table{border-collapse:collapse;width:100%;font-size:13px}
 td{padding:5px 10px;border-bottom:1px solid var(--color-border);vertical-align:baseline}
 .tok{font-family:var(--font-sans);color:var(--color-text-soft);white-space:nowrap}
 .ex{font-family:var(--font-display);font-weight:600;color:var(--color-text)}
</style></head><body>
 <table>
   <tr><td class="tok">--text-h1</td><td class="ex" style="font-size:30px">clamp 34–62</td></tr>
   <tr><td class="tok">--text-h2</td><td class="ex" style="font-size:24px">clamp 28–44</td></tr>
   <tr><td class="tok">--text-h3</td><td class="ex" style="font-size:20px">32 px</td></tr>
   <tr><td class="tok">--text-lead</td><td class="ex" style="font-size:17px;font-family:var(--font-sans);font-weight:400">19 px</td></tr>
   <tr><td class="tok">--text-body</td><td class="ex" style="font-size:15px;font-family:var(--font-sans);font-weight:400">15.5 px</td></tr>
 </table>
</body></html>

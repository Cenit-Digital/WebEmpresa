<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#F2F4EF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#12082A" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <script>
      // Aplica el tema (claro/oscuro) antes del primer pintado para evitar FOUC.
      // Espeja src/lib/theme.ts:initialThemeAttribute: la clave solo vale
      // 'light'|'dark'; su ausencia (o cualquier otro valor) = "Sistema".
      ;(function () {
        try {
          var stored = localStorage.getItem('cenit-theme')
          var theme =
            stored === 'dark' || stored === 'light'
              ? stored
              : matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.dataset.theme = theme
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
